name: Bug report
description: A reusable workflow misbehaves (wrong result, unexpected failure, or bad permission scope).
title: "bug: <workflow>: <short summary>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. This is for **behavioral bugs** in a reusable
        workflow. Do **not** report security vulnerabilities here — use a private
        [Security Advisory](https://github.com/NDDev-it-com/ci-workflows/security/advisories/new)
        (see SECURITY.md).
  - type: dropdown
    id: workflow
    attributes:
      label: Which workflow?
      description: The reusable workflow that misbehaves.
      options:
        - public-codeql.yml
        - public-scorecard.yml
        - public-scorecard-json.yml
        - public-dependency-review.yml
        - secret-scan.yml
        - actionlint.yml
        - zizmor-sarif.yml
        - zizmor-no-sarif.yml
        - cross-platform-smoke.yml
        - release-supply-chain.yml
        - private-static.yml
        - python-ci.yml
        - node-ci.yml
        - go-ci.yml
        - rust-ci.yml
        - java-ci.yml
        - dotnet-ci.yml
        - container-ci.yml
        - terraform-ci.yml
        - docs-ci.yml
        - monorepo-changed-paths.yml
        - ci.yml (self-CI)
        - release.yml (self-release)
        - Other / not sure
    validations:
      required: true
  - type: input
    id: pinned-sha
    attributes:
      label: Pinned SHA / ref
      description: The full commit SHA (or ref) of ci-workflows you called.
      placeholder: "e.g. NDDev-it-com/ci-workflows/....yml@<40-char-sha>"
    validations:
      required: true
  - type: textarea
    id: caller
    attributes:
      label: Caller snippet
      description: The `jobs.<id>.uses` block (with `with:` inputs and `permissions:`) that reproduces the problem.
      render: yaml
      placeholder: |
        jobs:
          secret-scan:
            uses: NDDev-it-com/ci-workflows/.github/workflows/secret-scan.yml@<sha>
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include relevant log lines or error output.
    validations:
      required: true
  - type: input
    id: run-url
    attributes:
      label: Failing run URL
      description: Link to the GitHub Actions run (or job step) that shows the problem.
      placeholder: "https://github.com/<org>/<repo>/actions/runs/<id>"
    validations:
      required: false
  - type: dropdown
    id: tier
    attributes:
      label: Tier
      description: Which billing tier is the calling repository?
      options:
        - Public (free OSS suite)
        - Private free tier (zero-cost only)
        - Private paid tier (GHAS / harden-runner)
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: This is not a security vulnerability (those go to a private Security Advisory).
          required: true
        - label: I pinned ci-workflows by full commit SHA, not a tag or branch.
          required: true
        - label: I searched existing issues for a duplicate.
          required: true
