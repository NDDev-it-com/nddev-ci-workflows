name: actionlint

# Reusable actionlint (checksum-verified binary) for BOTH tiers.
# Lints workflow YAML for syntax errors, expression typos, and deprecated usage.
#
# Runner contract: Linux X64 only. The workflow downloads the upstream
# linux_amd64 tarball, verifies it with sha256sum, and installs into
# /usr/local/bin, so any other OS/architecture is rejected by an explicit
# guard before the download instead of failing half-way through.

on:
  workflow_call:
    inputs:
      runner:
        description: 'Linux X64 runner label; other platforms are rejected by the runner-contract guard.'
        type: string
        default: 'ubuntu-latest'
      actionlint_version:
        type: string
        default: '1.7.12'
      actionlint_sha256:
        description: 'SHA256 of actionlint_<ver>_linux_amd64.tar.gz from upstream checksums.txt.'
        type: string
        default: '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8'
      post_command:
        description: 'Optional extra static check after actionlint, e.g. a repository-local pin validator.'
        type: string
        default: ''

permissions: {}

jobs:
  actionlint:
    name: actionlint
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Validate runner contract
        shell: bash
        env:
          ACTIONLINT_RUNNER_OS: ${{ runner.os }}
          ACTIONLINT_RUNNER_ARCH: ${{ runner.arch }}
        run: |
          set -euo pipefail
          python3 -I <<'PY'
          import os
          import sys

          def fail(message):
              print(f"actionlint runner contract: {message}", file=sys.stderr)
              raise SystemExit(1)

          if os.environ["ACTIONLINT_RUNNER_OS"] != "Linux":
              fail(
                  "this workflow downloads the linux_amd64 actionlint binary; "
                  "the runner must be Linux X64"
              )
          if os.environ["ACTIONLINT_RUNNER_ARCH"] != "X64":
              fail(
                  "the pinned actionlint_sha256 covers the linux_amd64 tarball "
                  "only; the runner must be Linux X64"
              )
          print("runner contract validated: Linux X64")
          PY

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download actionlint (pinned + checksum-verified)
        env:
          ACTIONLINT_VERSION: ${{ inputs.actionlint_version }}
          ACTIONLINT_SHA256: ${{ inputs.actionlint_sha256 }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tar.gz" | sha256sum -c -
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          install -m 0755 /tmp/actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Run actionlint
        run: actionlint -color

      - name: Run post-actionlint command
        if: ${{ inputs.post_command != '' }}
        env:
          POST_COMMAND: ${{ inputs.post_command }}
        run: bash -c "$POST_COMMAND"
