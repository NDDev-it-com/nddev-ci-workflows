name: actionlint

# Reusable actionlint (checksum-verified binary) for BOTH tiers.
# Lints workflow YAML for syntax errors, expression typos, and deprecated usage.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      actionlint_version:
        type: string
        default: '1.7.12'
      actionlint_sha256:
        description: 'SHA256 of actionlint_<ver>_linux_amd64.tar.gz from upstream checksums.txt.'
        type: string
        default: '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8'
      enable_harden_runner:
        type: boolean
        default: true

permissions: {}

jobs:
  actionlint:
    name: actionlint
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download actionlint (pinned + checksum-verified)
        env:
          ACTIONLINT_VERSION: ${{ inputs.actionlint_version }}
          ACTIONLINT_SHA256: ${{ inputs.actionlint_sha256 }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tar.gz" | sha256sum -c -
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          install -m 0755 /tmp/actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Run actionlint
        run: actionlint -color
