name: benchmark-compare

# Reusable performance benchmark COMPARE lane for BOTH tiers. Identical
# toolchain setup and github-action-benchmark comparison to benchmark.yml, but
# strictly read-only: the job requests `contents: read`, so the GITHUB_TOKEN
# that reaches the third-party action cannot write to the repository, and
# auto-push is hard-wired off (the action only fetches gh-pages history for
# the comparison). Use benchmark.yml on the default branch to record history;
# use this lane for pull requests and every other read-only regression check.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      language:
        description: 'Toolchain to set up: python, rust, node, go, or none.'
        type: string
        default: 'python'
      working_directory:
        type: string
        default: '.'
      python_version:
        type: string
        default: '3.13'
      node_version:
        type: string
        default: '22'
      rust_toolchain:
        type: string
        default: 'stable'
      go_version:
        type: string
        default: 'stable'
      bench_command:
        description: 'Command that runs benchmarks and writes output_file_path.'
        type: string
        default: ''
      tool:
        description: 'github-action-benchmark tool: cargo, pytest, benchmarkjs, go, googlecpp, ...'
        type: string
        default: 'pytest'
      output_file_path:
        type: string
        default: 'output.json'
      alert_threshold:
        type: string
        default: '200%'
      fail_on_alert:
        type: boolean
        default: true
      timeout_minutes:
        type: number
        default: 30

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  benchmark:
    name: benchmark compare (${{ inputs.language }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read        # read-only token: comparison fetches history, never pushes
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Set up Node.js
        if: ${{ inputs.language == 'node' }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ inputs.node_version }}

      - name: Set up Rust
        if: ${{ inputs.language == 'rust' }}
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1.17.0
        with:
          toolchain: ${{ inputs.rust_toolchain }}

      - name: Set up Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: ${{ inputs.go_version }}

      - name: Run benchmarks
        if: ${{ inputs.bench_command != '' }}
        env:
          BENCH_COMMAND: ${{ inputs.bench_command }}
        run: bash -c "$BENCH_COMMAND"

      - name: Compare and alert
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba  # v1.22.1
        with:
          tool: ${{ inputs.tool }}
          output-file-path: ${{ inputs.output_file_path }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: ${{ inputs.alert_threshold }}
          fail-on-alert: ${{ inputs.fail_on_alert }}
          auto-push: false
          comment-on-alert: false
