name: docs-quality

# Reusable docs quality gate for BOTH tiers: link checking
# (lychee), spell checking (typos), and Markdown linting (markdownlint-cli2).
# Every tool is free on every tier.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      working_directory:
        type: string
        default: '.'
      lychee:
        type: boolean
        default: true
      lychee_args:
        description: 'Arguments passed to lychee.'
        type: string
        default: '--no-progress --max-concurrency 8 "**/*.md"'
      typos:
        type: boolean
        default: true
      typos_files:
        type: string
        default: '.'
      markdownlint:
        type: boolean
        default: true
      markdownlint_globs:
        type: string
        default: '**/*.md'
      timeout_minutes:
        type: number
        default: 15

permissions: {}

jobs:
  docs-quality:
    name: docs-quality
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Link check (lychee)
        if: ${{ inputs.lychee }}
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: ${{ inputs.lychee_args }}
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: ${{ inputs.working_directory }}

      - name: Spell check (typos)
        if: ${{ inputs.typos }}
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14  # v1.48.0
        with:
          files: ${{ inputs.typos_files }}

      - name: Markdown lint
        if: ${{ inputs.markdownlint }}
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25  # v24.0.0
        with:
          globs: ${{ inputs.markdownlint_globs }}
