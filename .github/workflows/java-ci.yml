name: java-ci

# Reusable Java CI for BOTH tiers: harden-runner, pinned setup-java (Temurin by
# default, built-in build-tool cache), and caller-provided build/test command.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      java_version:
        type: string
        default: '21'
      distribution:
        type: string
        default: 'temurin'
      cache:
        description: 'setup-java cache: maven, gradle, sbt, or empty to disable.'
        type: string
        default: 'maven'
      working_directory:
        type: string
        default: '.'
      test_command:
        description: 'Build/test command (bash).'
        type: string
        default: 'mvn -B verify'
      enable_harden_runner:
        type: boolean
        default: true
      timeout_minutes:
        type: number
        default: 30

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  java:
    name: java (${{ inputs.java_version }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Harden runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          java-version: ${{ inputs.java_version }}
          distribution: ${{ inputs.distribution }}
          cache: ${{ inputs.cache }}

      - name: Build and test
        env:
          TEST_COMMAND: ${{ inputs.test_command }}
          JAVA_VER: ${{ inputs.java_version }}
          JAVA_DIST: ${{ inputs.distribution }}
        run: |
          bash -c "$TEST_COMMAND"
          echo "Java ${JAVA_VER} (${JAVA_DIST}) build + tests passed." >> "$GITHUB_STEP_SUMMARY"
