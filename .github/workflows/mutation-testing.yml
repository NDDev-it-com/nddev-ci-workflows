name: mutation-testing

# Reusable mutation testing for BOTH tiers. Sets up the toolchain for the chosen
# language (python -> mutmut, rust -> cargo-mutants, node -> Stryker) and runs
# caller-provided install/mutation commands passed via env.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      language:
        description: 'Toolchain to set up: python, rust, or node.'
        type: string
        default: 'python'
      working_directory:
        type: string
        default: '.'
      python_version:
        type: string
        default: '3.13'
      node_version:
        type: string
        default: '22'
      rust_toolchain:
        type: string
        default: 'stable'
      install_command:
        description: 'Install the mutation tool, e.g. "pip install mutmut" / "cargo install cargo-mutants --locked" / "npm ci".'
        type: string
        default: ''
      mutation_command:
        description: 'Run mutation testing, e.g. "mutmut run" / "cargo mutants" / "npx stryker run".'
        type: string
        default: ''
      enable_harden_runner:
        type: boolean
        default: true
      timeout_minutes:
        type: number
        default: 45

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  mutation:
    name: mutation (${{ inputs.language }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Harden runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Set up Node.js
        if: ${{ inputs.language == 'node' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}

      - name: Set up Rust
        if: ${{ inputs.language == 'rust' }}
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1.17.0
        with:
          toolchain: ${{ inputs.rust_toolchain }}

      - name: Install mutation tool
        if: ${{ inputs.install_command != '' }}
        env:
          INSTALL_COMMAND: ${{ inputs.install_command }}
        run: bash -c "$INSTALL_COMMAND"

      - name: Run mutation testing
        env:
          MUTATION_COMMAND: ${{ inputs.mutation_command }}
        run: |
          bash -c "$MUTATION_COMMAND"
          echo "Mutation testing passed." >> "$GITHUB_STEP_SUMMARY"
