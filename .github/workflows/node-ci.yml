name: node-ci

# Reusable Node.js CI for BOTH tiers: harden-runner, pinned setup-node with
# optional package-manager cache, and caller-provided install/test commands
# passed via env.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      node_version:
        type: string
        default: '22'
      working_directory:
        type: string
        default: '.'
      cache:
        description: 'setup-node cache: npm, yarn, pnpm, or empty to disable.'
        type: string
        default: ''
      cache_dependency_path:
        type: string
        default: ''
      install_command:
        description: 'Dependency install command (bash).'
        type: string
        default: 'npm ci'
      test_command:
        description: 'Test/verify command (bash).'
        type: string
        required: true
      enable_harden_runner:
        type: boolean
        default: true
      timeout_minutes:
        type: number
        default: 20

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  node:
    name: node (${{ inputs.node_version }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Harden runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.cache }}
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Install dependencies
        if: ${{ inputs.install_command != '' }}
        env:
          INSTALL_COMMAND: ${{ inputs.install_command }}
        run: bash -c "$INSTALL_COMMAND"

      - name: Run tests
        env:
          TEST_COMMAND: ${{ inputs.test_command }}
          NODE_VER: ${{ inputs.node_version }}
        run: |
          bash -c "$TEST_COMMAND"
          echo "Node ${NODE_VER} tests passed." >> "$GITHUB_STEP_SUMMARY"
