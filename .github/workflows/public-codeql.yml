name: public-codeql

# Reusable CodeQL code-scanning for PUBLIC repositories (free GitHub code scanning).
# Caller example:
#   jobs:
#     codeql:
#       uses: NDDev-it-com/ci-workflows/.github/workflows/public-codeql.yml@<full-sha>
#       with:
#         languages: '["python","actions"]'

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of CodeQL languages, e.g. ["python","actions"].'
        type: string
        default: '["actions"]'
      queries:
        description: 'CodeQL query suite.'
        type: string
        default: 'security-and-quality'
      config_file:
        description: 'Optional CodeQL config file path.'
        type: string
        default: ''
      autobuild:
        description: 'Run github/codeql-action/autobuild before analyze.'
        type: boolean
        default: false
      output_directory:
        description: 'Optional CodeQL analyze output directory for SARIF artifacts.'
        type: string
        default: ''
      upload_sarif_artifact:
        description: 'Upload output_directory as an artifact after analysis.'
        type: boolean
        default: false
      artifact_name:
        type: string
        default: 'codeql-results'
      retention_days:
        type: number
        default: 14
      runner:
        description: 'Runner label.'
        type: string
        default: 'ubuntu-latest'
      egress_policy:
        description: 'harden-runner egress policy: audit or block.'
        type: string
        default: 'audit'

permissions: {}

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: ${{ inputs.egress_policy }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        if: ${{ inputs.config_file == '' }}
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          languages: ${{ matrix.language }}
          queries: ${{ inputs.queries }}

      - name: Initialize CodeQL with config
        if: ${{ inputs.config_file != '' }}
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          languages: ${{ matrix.language }}
          config-file: ${{ inputs.config_file }}

      - name: Autobuild
        if: ${{ inputs.autobuild }}
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0

      - name: Analyze
        if: ${{ inputs.output_directory == '' }}
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          category: "/language:${{ matrix.language }}"

      - name: Analyze with output directory
        if: ${{ inputs.output_directory != '' }}
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          category: "/language:${{ matrix.language }}"
          output: ${{ inputs.output_directory }}

      - name: Upload CodeQL SARIF artifact
        if: ${{ always() && inputs.upload_sarif_artifact && inputs.output_directory != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.artifact_name }}-${{ matrix.language }}
          path: ${{ inputs.output_directory }}
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
