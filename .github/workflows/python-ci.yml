name: python-ci

# Reusable Python CI for BOTH tiers: pinned astral-sh/setup-uv with dependency
# caching, a uv-managed Python toolchain, and caller-provided install/test
# commands passed via env (no `${{ inputs.* }}` inline in run:).

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      python_version:
        type: string
        default: '3.13'
      working_directory:
        type: string
        default: '.'
      uv_version:
        description: 'Exact astral-sh/uv version to pin.'
        type: string
        default: '0.11.29'
      install_command:
        description: 'Dependency install command (bash). Empty to skip.'
        type: string
        default: 'uv sync --frozen'
      test_command:
        description: 'Test/verify command (bash).'
        type: string
        required: true
      timeout_minutes:
        type: number
        default: 20

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  python:
    name: python (${{ inputs.python_version }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: ${{ inputs.uv_version }}
          enable-cache: true

      - name: Install Python
        env:
          PY_VERSION: ${{ inputs.python_version }}
        run: uv python install "$PY_VERSION"

      - name: Install dependencies
        if: ${{ inputs.install_command != '' }}
        env:
          INSTALL_COMMAND: ${{ inputs.install_command }}
        run: bash -c "$INSTALL_COMMAND"

      - name: Run tests
        env:
          TEST_COMMAND: ${{ inputs.test_command }}
          PY_VERSION: ${{ inputs.python_version }}
        run: |
          bash -c "$TEST_COMMAND"
          echo "Python ${PY_VERSION} tests passed." >> "$GITHUB_STEP_SUMMARY"
