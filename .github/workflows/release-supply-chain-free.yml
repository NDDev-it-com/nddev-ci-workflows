name: release-supply-chain-free

# Reusable release supply chain for the private-free tier (no attestations).
#
# GitHub Artifact Attestations are unavailable to private and internal
# repositories on the Free, Pro, and Team plans (they require GitHub
# Enterprise Cloud), so this variant never invokes the GitHub attestation
# actions and requests only the contents permission. Public repositories and
# GHEC private repositories should call release-supply-chain.yml instead for
# attested SLSA Build L3 provenance.
#
# Produces, for a numeric tag, exactly five release assets: a deterministic
# tracked-source archive, an SPDX SBOM of that exact archive payload, canonical
# release notes, a release manifest, and SHA256SUMS. It publishes ONE immutable
# GitHub Release with every asset attached in a single create call. The release
# manifest records slsa_build_level: null because no provenance is generated.
#
# Immutable releases (GA 2025-10-28): assets on a published release cannot be
# modified, deleted, or clobbered. This workflow therefore fails fast if the
# release already exists and never uses `gh release upload --clobber`.

on:
  workflow_call:
    inputs:
      version:
        description: 'Numeric SemVer X.Y.Z (must equal the tag / VERSION file).'
        type: string
        required: true
      package_name:
        description: 'Safe release asset basename (letters, digits, dot, underscore, hyphen).'
        type: string
        required: true
      archive_paths:
        description: >-
          Space-separated normalized relative tracked path selections. Quote a
          selection containing spaces.
        type: string
        default: 'README.md LICENSE NOTICE VERSION CHANGELOG.md .github'
      runtime_paths:
        description: >-
          Optional space-separated normalized tracked path selections for a
          second, minimal runtime bundle attached alongside the source archive.
          Empty (default) produces no runtime bundle and leaves every other
          asset and checksum byte-for-byte unchanged.
        type: string
        default: ''
      runner:
        type: string
        default: 'ubuntu-latest'
      notes_file:
        description: >-
          Optional tracked UTF-8 notes path; a matching non-empty CHANGELOG
          section is required when empty.
        type: string
        default: ''

permissions: {}

jobs:
  release:
    name: Build and publish release bundle (no attestations)
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    permissions:
      contents: write        # create the GitHub Release
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      PACKAGE_NAME: ${{ inputs.package_name }}
      ARCHIVE_PATHS: ${{ inputs.archive_paths }}
      RUNTIME_PATHS: ${{ inputs.runtime_paths }}
    steps:
      - name: Validate release inputs before checkout
        env:
          RELEASE_RUNNER_ARCH: ${{ runner.arch }}
          RELEASE_RUNNER_OS: ${{ runner.os }}
        run: |
          set -euo pipefail
          python3 -I <<'PY'
          import os
          import re
          import sys

          numeric_semver = re.compile(
              r"(?:0|[1-9][0-9]*)\."
              r"(?:0|[1-9][0-9]*)\."
              r"(?:0|[1-9][0-9]*)"
          )

          def fail(message):
              print(f"release inputs: {message}", file=sys.stderr)
              raise SystemExit(1)

          if numeric_semver.fullmatch(os.environ["RELEASE_VERSION"]) is None:
              fail("version must be numeric SemVer X.Y.Z without leading zeros")
          package_name = os.environ["PACKAGE_NAME"]
          if re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,127}", package_name) is None:
              fail("package_name must be a safe 1-128 character asset basename")
          if os.environ["RELEASE_RUNNER_OS"] != "Linux":
              fail("runner must be Linux because the release contract requires GNU tar")
          if os.environ["RELEASE_RUNNER_ARCH"] not in {"X64", "ARM64"}:
              fail("runner architecture must be X64 or ARM64")
          print("release inputs validated before checkout")
          PY

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.version }}
          # Publication uses gh with GITHUB_TOKEN; no git credentials are needed.
          persist-credentials: false

      - name: Validate checked-out release contract
        env:
          RELEASE_REF_NAME: ${{ github.ref_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          python3 -I <<'PY'
          import os
          import pathlib
          import re
          import subprocess
          import sys

          def fail(message):
              print(f"release contract: {message}", file=sys.stderr)
              raise SystemExit(1)

          version = os.environ["RELEASE_VERSION"]
          expected_version_file = f"{version}\n".encode("ascii")
          try:
              actual_version_file = pathlib.Path("VERSION").read_bytes()
          except OSError as exc:
              fail(f"cannot read VERSION: {exc}")
          if actual_version_file != expected_version_file:
              fail("VERSION must contain the exact release version on one LF-terminated line")
          if (
              os.environ.get("RELEASE_REF_TYPE") == "tag"
              and os.environ.get("RELEASE_REF_NAME") != version
          ):
              fail("version must equal the triggering tag")
          tag_ref = f"refs/tags/{version}"
          try:
              tag_object = subprocess.check_output(
                  ["git", "rev-parse", "--verify", tag_ref], text=True
              ).strip()
              tag_commit = subprocess.check_output(
                  ["git", "rev-parse", "--verify", f"{tag_ref}^{{commit}}"],
                  text=True,
              ).strip()
              head_commit = subprocess.check_output(
                  ["git", "rev-parse", "--verify", "HEAD"], text=True
              ).strip()
          except subprocess.CalledProcessError as exc:
              fail(f"cannot resolve release tag identity: {exc}")
          object_id = re.compile(r"[0-9a-f]{40}|[0-9a-f]{64}")
          if object_id.fullmatch(tag_object) is None:
              fail("release tag object has an invalid object ID")
          if object_id.fullmatch(tag_commit) is None or tag_commit != head_commit:
              fail("checked-out HEAD must equal the requested tag commit")
          tracked_changelog = subprocess.run(
              [
                  "git",
                  "--literal-pathspecs",
                  "ls-files",
                  "--error-unmatch",
                  "--",
                  "CHANGELOG.md",
              ],
              check=False,
              stdout=subprocess.DEVNULL,
              stderr=subprocess.DEVNULL,
          ).returncode == 0
          changelog = pathlib.Path("CHANGELOG.md")
          if changelog.exists() and not tracked_changelog:
              fail("CHANGELOG.md exists but is not tracked by the release tag")
          if tracked_changelog:
              if changelog.is_symlink() or not changelog.is_file():
                  fail("tracked CHANGELOG.md must be a regular non-symlink file")
              heading = re.compile(rf"## \[{re.escape(version)}\](?: - .+)?")
              try:
                  lines = changelog.read_text(encoding="utf-8").splitlines()
              except OSError as exc:
                  fail(f"cannot read CHANGELOG.md: {exc}")
              if sum(heading.fullmatch(line) is not None for line in lines) != 1:
                  fail("tracked CHANGELOG.md must have exactly one release heading")
          print(f"release contract validated for {version}")
          PY

      - name: Preflight — refuse to modify an existing (immutable) release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Release '$RELEASE_VERSION' already exists." >&2
            echo "Immutable releases cannot be modified; bump the version instead." >&2
            exit 1
          fi
          echo "No existing release for '$RELEASE_VERSION'; proceeding."

      - name: Build deterministic tracked-source archive
        env:
          RELEASE_DIST: ${{ runner.temp }}/release-dist
          RELEASE_PAYLOAD: ${{ runner.temp }}/release-payload
        run: |
          set -euo pipefail
          for path in "$RELEASE_DIST" "$RELEASE_PAYLOAD"; do
            if [ -e "$path" ] || [ -L "$path" ]; then
              echo "release workspace path already exists" >&2
              exit 1
            fi
          done
          mkdir -m 700 "$RELEASE_DIST" "$RELEASE_PAYLOAD"
          archive="$RELEASE_DIST/${PACKAGE_NAME}-${RELEASE_VERSION}.tar.gz"
          archive_file_list="$(mktemp "${RUNNER_TEMP}/release-archive-files.XXXXXX")"
          trap 'rm -f -- "$archive_file_list"' EXIT

          # Expand normalized caller selections through the Git index. The NUL
          # list contains only tracked files and is never interpreted as tar
          # options, even when a repository contains unusual filenames.
          python3 -I - "$archive_file_list" <<'PY'
          import os
          import pathlib
          import shlex
          import stat
          import subprocess
          import sys

          def fail(message):
              print(f"archive_paths: {message}", file=sys.stderr)
              raise SystemExit(1)

          def has_control(value):
              return any(ord(character) < 32 or ord(character) == 127 for character in value)

          raw = os.environ["ARCHIVE_PATHS"]
          if has_control(raw):
              fail("control characters are not allowed")
          try:
              requested = shlex.split(raw, comments=False, posix=True)
          except ValueError:
              fail("value must be a well-formed space-separated path list")
          if not requested:
              fail("at least one tracked path is required")

          for command in (
              ["git", "diff", "--quiet", "--no-ext-diff", "--"],
              ["git", "diff", "--cached", "--quiet", "--no-ext-diff", "--"],
          ):
              if subprocess.run(command, check=False).returncode != 0:
                  fail("tracked files must match the checked-out tag exactly")

          selected = set()
          seen_requests = set()
          for index, token in enumerate(requested, start=1):
              if token in seen_requests:
                  fail(f"duplicate selection at position {index}")
              seen_requests.add(token)
              if has_control(token):
                  fail(f"control character in selection at position {index}")
              if token.startswith("-"):
                  fail(f"option-like selection at position {index}")
              if token.startswith("/"):
                  fail(f"absolute selection at position {index}")
              path = pathlib.PurePosixPath(token)
              if (
                  token in {"", ".", ".."}
                  or path.is_absolute()
                  or path.as_posix() != token
                  or any(part in {"", ".", ".."} for part in path.parts)
              ):
                  fail(f"non-normalized or traversing selection at position {index}")

              result = subprocess.run(
                  [
                      "git",
                      "--literal-pathspecs",
                      "ls-files",
                      "--cached",
                      "-z",
                      "--",
                      token,
                  ],
                  check=False,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.DEVNULL,
              )
              if result.returncode != 0:
                  fail(f"Git rejected selection at position {index}")
              matches = [entry for entry in result.stdout.split(b"\0") if entry]
              if not matches:
                  fail(f"selection at position {index} matches no tracked path")
              for entry in matches:
                  if (
                      entry.startswith((b"/", b"-"))
                      or any(byte < 32 or byte == 127 for byte in entry)
                      or any(part in {b"", b".", b".."} for part in entry.split(b"/"))
                  ):
                      fail(f"selection at position {index} expands to an unsafe path")
                  checkout_path = os.fsdecode(entry)
                  if not os.path.lexists(checkout_path):
                      fail(f"selection at position {index} is absent from the checkout")
                  metadata = os.lstat(checkout_path)
                  if not stat.S_ISREG(metadata.st_mode):
                      fail(
                          f"selection at position {index} contains a symlink, "
                          "submodule, or non-regular Git entry"
                      )
                  selected.add(entry)

          if not selected:
              fail("tracked path expansion is empty")
          output = pathlib.Path(sys.argv[1])
          output.write_bytes(b"".join(entry + b"\0" for entry in sorted(selected)))
          PY

          source_time="$(git log -1 --format=%cI)"
          LC_ALL=C tar --create --file=- \
            --sort=name \
            --mtime="$source_time" \
            --owner=0 --group=0 --numeric-owner \
            --no-recursion \
            --null --verbatim-files-from \
            --files-from="$archive_file_list" \
            | gzip -n > "$archive"
          test -s "$archive"
          gzip -dc -- "$archive" \
            | tar --extract --file=- --directory="$RELEASE_PAYLOAD" \
              --no-same-owner --no-same-permissions
          rm -f -- "$archive_file_list"
          trap - EXIT

      - name: Verify extracted archive payload
        env:
          RELEASE_DIST: ${{ runner.temp }}/release-dist
          RELEASE_PAYLOAD: ${{ runner.temp }}/release-payload
        run: |
          set -euo pipefail
          python3 -I <<'PY'
          import hashlib
          import os
          import pathlib
          import stat
          import sys
          import tarfile

          def fail(message):
              print(f"archive payload: {message}", file=sys.stderr)
              raise SystemExit(1)

          archive = (
              pathlib.Path(os.environ["RELEASE_DIST"])
              / f'{os.environ["PACKAGE_NAME"]}-{os.environ["RELEASE_VERSION"]}.tar.gz'
          )
          payload = pathlib.Path(os.environ["RELEASE_PAYLOAD"])
          members = []
          try:
              with tarfile.open(archive, mode="r:gz") as bundle:
                  for member in bundle.getmembers():
                      if not member.isfile():
                          fail("archive must contain regular files only")
                      path = pathlib.PurePosixPath(member.name)
                      if (
                          member.name.startswith(("/", "-"))
                          or path.as_posix() != member.name
                          or any(part in {"", ".", ".."} for part in path.parts)
                      ):
                          fail("archive contains an unsafe or non-normalized path")
                      source = bundle.extractfile(member)
                      if source is None:
                          fail("archive member content is unavailable")
                      digest = hashlib.sha256()
                      for block in iter(lambda: source.read(1024 * 1024), b""):
                          digest.update(block)
                      members.append((member.name, digest.hexdigest()))
          except (OSError, tarfile.TarError) as exc:
              fail(f"cannot inspect archive: {exc}")

          names = [name for name, _ in members]
          if not names or len(names) != len(set(names)):
              fail("archive member set must be non-empty and unique")
          expected_directories = {
              pathlib.PurePosixPath(name).parent.as_posix()
              for name in names
              if pathlib.PurePosixPath(name).parent.as_posix() != "."
          }
          expected_directories |= {
              parent.as_posix()
              for name in names
              for parent in pathlib.PurePosixPath(name).parents
              if parent.as_posix() != "."
          }

          extracted = {}
          extracted_directories = set()
          try:
              for root, directories, files in os.walk(payload):
                  for directory in directories:
                      directory_path = pathlib.Path(root, directory)
                      if directory_path.is_symlink() or not directory_path.is_dir():
                          fail("extracted payload contains an unsafe directory")
                      extracted_directories.add(
                          directory_path.relative_to(payload).as_posix()
                      )
                  for filename in files:
                      file_path = pathlib.Path(root, filename)
                      metadata = file_path.lstat()
                      if file_path.is_symlink() or not stat.S_ISREG(metadata.st_mode):
                          fail("extracted payload contains a non-regular file")
                      relative = file_path.relative_to(payload).as_posix()
                      digest = hashlib.sha256()
                      with file_path.open("rb") as stream:
                          for block in iter(lambda: stream.read(1024 * 1024), b""):
                              digest.update(block)
                      extracted[relative] = digest.hexdigest()
          except OSError as exc:
              fail(f"cannot inspect extracted payload: {exc}")

          if dict(members) != extracted:
              fail("extracted payload differs from the exact archive file closure")
          if expected_directories != extracted_directories:
              fail("extracted directory closure differs from archived file parents")
          print(f"verified {len(members)} extracted archive files")
          PY

      - name: Generate SPDX SBOM from exact archive payload (Syft)
        env:
          RELEASE_DIST: ${{ runner.temp }}/release-dist
          RELEASE_PAYLOAD: ${{ runner.temp }}/release-payload
          RELEASE_RUNNER_ARCH: ${{ runner.arch }}
          RELEASE_RUNNER_OS: ${{ runner.os }}
          SYFT_CHECK_FOR_APP_UPDATE: 'false'
          SYFT_LINUX_ARM64_SHA256: dc630590c953347789d08f8ebf57c7d8094db89100785fcd94b1cddeac791804
          SYFT_LINUX_ARM64_SIZE: '25154290'
          SYFT_LINUX_X64_SHA256: 0d6be741479eddd2c8644a288990c04f3df0d609bbc1599a005532a9dff63509
          SYFT_LINUX_X64_SIZE: '27565477'
          SYFT_VERSION: '1.42.3'
        run: |
          set -euo pipefail
          umask 077
          if [ "$RELEASE_RUNNER_OS" != "Linux" ]; then
            echo "Syft release generation requires Linux" >&2
            exit 1
          fi
          case "$RELEASE_RUNNER_ARCH" in
            X64)
              syft_arch="amd64"
              expected_sha256="$SYFT_LINUX_X64_SHA256"
              expected_size="$SYFT_LINUX_X64_SIZE"
              ;;
            ARM64)
              syft_arch="arm64"
              expected_sha256="$SYFT_LINUX_ARM64_SHA256"
              expected_size="$SYFT_LINUX_ARM64_SIZE"
              ;;
            *)
              echo "unsupported Syft runner architecture" >&2
              exit 1
              ;;
          esac

          syft_archive="$(mktemp "${RUNNER_TEMP}/syft.XXXXXX.tar.gz")"
          syft_directory="$(mktemp -d "${RUNNER_TEMP}/syft-bin.XXXXXX")"
          sbom_temporary="$(mktemp "${RELEASE_DIST}/.sbom.spdx.json.XXXXXX")"
          cleanup() {
            rm -rf -- "$syft_archive" "$syft_directory" "$sbom_temporary"
          }
          trap cleanup EXIT
          syft_url="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_${syft_arch}.tar.gz"
          curl --disable --fail --show-error --silent --location \
            --proto '=https' --proto-redir '=https' --tlsv1.2 \
            --max-filesize "$expected_size" \
            --output "$syft_archive" "$syft_url"
          actual_size="$(wc -c < "$syft_archive" | tr -d '[:space:]')"
          if [ "$actual_size" != "$expected_size" ]; then
            echo "Syft archive size mismatch" >&2
            exit 1
          fi
          printf '%s  %s\n' "$expected_sha256" "$syft_archive" | sha256sum -c -
          tar --extract --gzip --file="$syft_archive" \
            --directory="$syft_directory" -- syft
          syft_binary="$syft_directory/syft"
          if [ -L "$syft_binary" ] || [ ! -f "$syft_binary" ] || [ ! -x "$syft_binary" ]; then
            echo "verified Syft archive did not contain an executable regular binary" >&2
            exit 1
          fi
          actual_syft_version="$(
            "$syft_binary" version -o json \
              | python3 -I -c 'import json,sys; print(json.load(sys.stdin)["version"])'
          )"
          if [ "$actual_syft_version" != "$SYFT_VERSION" ]; then
            echo "verified Syft binary reported an unexpected version" >&2
            exit 1
          fi
          "$syft_binary" scan "dir:$RELEASE_PAYLOAD" \
            --source-name "$PACKAGE_NAME" \
            --source-version "$RELEASE_VERSION" \
            --output "spdx-json=$sbom_temporary"
          test -s "$sbom_temporary"
          if [ -e "$RELEASE_DIST/sbom.spdx.json" ] || [ -L "$RELEASE_DIST/sbom.spdx.json" ]; then
            echo "SBOM output path already exists" >&2
            exit 1
          fi
          mv -- "$sbom_temporary" "$RELEASE_DIST/sbom.spdx.json"
          rm -rf -- "$syft_archive" "$syft_directory"
          trap - EXIT

      - name: Prepare canonical release notes
        env:
          NOTES_FILE: ${{ inputs.notes_file }}
          RELEASE_DIST: ${{ runner.temp }}/release-dist
        run: |
          set -euo pipefail
          python3 -I <<'PY'
          import os
          import pathlib
          import subprocess
          import sys

          def fail(message):
              print(f"release notes: {message}", file=sys.stderr)
              raise SystemExit(1)

          release_dist = pathlib.Path(os.environ["RELEASE_DIST"])
          output = release_dist / "release-notes.md"
          if output.exists() or output.is_symlink():
              fail("canonical output path already exists")

          notes_file = os.environ["NOTES_FILE"]
          if notes_file:
              source = pathlib.Path(notes_file)
              if source.is_symlink() or not source.is_file():
                  fail("notes_file must be a regular non-symlink file")
              tracked = subprocess.run(
                  [
                      "git",
                      "--literal-pathspecs",
                      "ls-files",
                      "--error-unmatch",
                      "--",
                      notes_file,
                  ],
                  check=False,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )
              if tracked.returncode != 0:
                  fail("notes_file must be tracked by the release tag")
              try:
                  content = source.read_text(encoding="utf-8")
              except (OSError, UnicodeError) as exc:
                  fail(f"cannot read notes_file as UTF-8: {exc}")
          else:
              changelog = pathlib.Path("CHANGELOG.md")
              if changelog.is_symlink() or not changelog.is_file():
                  fail("provide notes_file or a regular CHANGELOG.md")
              tracked = subprocess.run(
                  [
                      "git",
                      "--literal-pathspecs",
                      "ls-files",
                      "--error-unmatch",
                      "--",
                      "CHANGELOG.md",
                  ],
                  check=False,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )
              if tracked.returncode != 0:
                  fail("CHANGELOG.md must be tracked by the release tag")
              try:
                  lines = changelog.read_text(encoding="utf-8").splitlines(
                      keepends=True
                  )
              except (OSError, UnicodeError) as exc:
                  fail(f"cannot read CHANGELOG.md as UTF-8: {exc}")
              heading = f'## [{os.environ["RELEASE_VERSION"]}]'
              body = []
              found = False
              for line in lines:
                  text = line.rstrip("\r\n")
                  if text == heading or text.startswith(heading + " - "):
                      if found:
                          fail("CHANGELOG.md contains duplicate release headings")
                      found = True
                      continue
                  if found and text.startswith("## ["):
                      break
                  if found:
                      body.append(line)
              if not found:
                  fail("exact changelog heading not found")
              content = "".join(body)

          if not content.strip():
              fail("canonical release notes must contain non-whitespace content")
          try:
              with output.open("x", encoding="utf-8", newline="\n") as stream:
                  stream.write(content)
          except OSError as exc:
              fail(f"cannot create canonical release notes: {exc}")
          if output.is_symlink() or not output.is_file() or output.stat().st_size == 0:
              fail("canonical release notes are not a non-empty regular file")
          print(f"canonical release notes: {output}")
          PY

      - name: Build deterministic runtime bundle
        if: inputs.runtime_paths != ''
        env:
          RELEASE_DIST: ${{ runner.temp }}/release-dist
        run: |
          set -euo pipefail
          python3 -I - "$RELEASE_DIST/${PACKAGE_NAME}-runtime-${RELEASE_VERSION}.tar.gz" <<'PY'
          import gzip
          import io
          import os
          import pathlib
          import shlex
          import subprocess
          import sys
          import tarfile

          def fail(message):
              print(f"runtime bundle: {message}", file=sys.stderr)
              raise SystemExit(1)

          raw = os.environ["RUNTIME_PATHS"]
          if any(ord(character) < 32 or ord(character) == 127 for character in raw):
              fail("control characters are not allowed")
          try:
              requested = shlex.split(raw, comments=False, posix=True)
          except ValueError:
              fail("runtime_paths must be a well-formed space-separated list")
          if not requested:
              fail("runtime_paths must select at least one tracked path")
          for index, token in enumerate(requested, start=1):
              path = pathlib.PurePosixPath(token)
              if (
                  token.startswith(("-", "/"))
                  or token in {"", ".", ".."}
                  or path.as_posix() != token
                  or any(part in {"", ".", ".."} for part in path.parts)
              ):
                  fail(f"non-normalized or unsafe selection at position {index}")

          index_entries = subprocess.run(
              ["git", "--literal-pathspecs", "ls-files", "-s", "-z", "--", *requested],
              check=False,
              stdout=subprocess.PIPE,
              stderr=subprocess.DEVNULL,
          )
          if index_entries.returncode != 0:
              fail("git rejected the runtime selection")
          members = []
          for chunk in index_entries.stdout.split(b"\0"):
              if not chunk:
                  continue
              meta, _, path_bytes = chunk.partition(b"\t")
              fields = meta.split(b" ")
              if len(fields) != 3:
                  fail("unexpected git index entry")
              mode, blob, _stage = fields
              if mode not in (b"100644", b"100755"):
                  fail(f"runtime bundle rejects non-regular entry mode {mode.decode()}")
              name = os.fsdecode(path_bytes)
              if name.startswith(("/", "-")) or any(
                  part in {"", ".", ".."} for part in name.split("/")
              ):
                  fail("unsafe expanded runtime path")
              members.append((name, mode == b"100755", os.fsdecode(blob)))
          if not members:
              fail("runtime selection matched no tracked files")

          mtime = int(
              subprocess.check_output(["git", "log", "-1", "--format=%ct"], text=True).strip()
          )
          buffer = io.BytesIO()
          with tarfile.open(fileobj=buffer, mode="w", format=tarfile.USTAR_FORMAT) as bundle:
              for name, executable, blob in sorted(members):
                  data = subprocess.check_output(["git", "cat-file", "blob", blob])
                  info = tarfile.TarInfo(name)
                  info.size = len(data)
                  info.mtime = mtime
                  info.mode = 0o755 if executable else 0o644
                  info.uid = info.gid = 0
                  info.uname = info.gname = ""
                  bundle.addfile(info, io.BytesIO(data))

          output = pathlib.Path(sys.argv[1])
          if output.exists() or output.is_symlink():
              fail("runtime bundle output path already exists")
          output.write_bytes(gzip.compress(buffer.getvalue(), mtime=0))
          if output.stat().st_size == 0:
              fail("runtime bundle is empty")
          print(f"runtime bundle: {len(members)} files -> {output.name}")
          PY

      - name: Finalize manifest, checksums, and asset closure
        env:
          RELEASE_DIST: ${{ runner.temp }}/release-dist
        run: |
          set -euo pipefail

          python3 -I <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          def fail(message):
              print(f"release assets: {message}", file=sys.stderr)
              raise SystemExit(1)

          version = os.environ["RELEASE_VERSION"]
          package_name = os.environ["PACKAGE_NAME"]
          release_dist = Path(os.environ["RELEASE_DIST"])
          archive = f"{package_name}-{version}.tar.gz"
          runtime_requested = bool(os.environ.get("RUNTIME_PATHS", "").strip())
          runtime_archive = f"{package_name}-runtime-{version}.tar.gz"
          staged = {archive, "sbom.spdx.json", "release-notes.md"}
          if runtime_requested:
              staged.add(runtime_archive)
          initial_assets = {path.name for path in release_dist.iterdir()}
          if initial_assets != staged:
              fail("archive/SBOM/release-notes staging set is not closed")
          for asset in initial_assets:
              path = release_dist / asset
              if path.is_symlink() or not path.is_file():
                  fail("archive and SBOM must be regular non-symlink files")
          created = subprocess.check_output(
              ["git", "log", "-1", "--format=%cI"], text=True
          ).strip()
          tag_ref = f"refs/tags/{version}"
          source_tag_object = subprocess.check_output(
              ["git", "rev-parse", "--verify", tag_ref], text=True
          ).strip()
          source_commit = subprocess.check_output(
              ["git", "rev-parse", "--verify", f"{tag_ref}^{{commit}}"],
              text=True,
          ).strip()
          head_commit = subprocess.check_output(
              ["git", "rev-parse", "--verify", "HEAD"], text=True
          ).strip()
          if source_commit != head_commit:
              fail("release tag commit changed after checkout validation")
          content_artifacts = [archive]
          if runtime_requested:
              content_artifacts.append(runtime_archive)
          content_artifacts += ["sbom.spdx.json", "release-notes.md"]
          manifest = {
              "package_name": package_name,
              "version": version,
              "source_commit": source_commit,
              "source_commit_time": created,
              "source_tag_object": source_tag_object,
              "slsa_build_level": None,
              "required_artifacts": [
                  *content_artifacts,
                  "release-manifest.json",
                  "SHA256SUMS",
              ],
          }
          manifest_path = release_dist / "release-manifest.json"
          manifest_path.write_text(
              json.dumps(manifest, indent=2) + "\n", encoding="utf-8"
          )

          checksum_names = (
              *content_artifacts,
              "release-manifest.json",
          )
          checksum_lines = []
          for name in checksum_names:
              digest = hashlib.sha256()
              with (release_dist / name).open("rb") as stream:
                  for block in iter(lambda: stream.read(1024 * 1024), b""):
                      digest.update(block)
              checksum_lines.append(f"{digest.hexdigest()}  {name}\n")
          (release_dist / "SHA256SUMS").write_text(
              "".join(checksum_lines), encoding="ascii"
          )

          required = set(manifest["required_artifacts"])
          final_assets = {path.name for path in release_dist.iterdir()}
          if final_assets != required:
              fail("final asset set differs from release-manifest.json")
          for asset in final_assets:
              path = release_dist / asset
              if path.is_symlink() or not path.is_file():
                  fail("every release asset must be a regular non-symlink file")
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-${{ inputs.version }}
          path: ${{ runner.temp }}/release-dist
          if-no-files-found: error
          retention-days: 30

      - name: Publish immutable GitHub Release (single create)
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_DIST: ${{ runner.temp }}/release-dist
        run: |
          set -euo pipefail
          assets=(
            "$RELEASE_DIST/${PACKAGE_NAME}-${RELEASE_VERSION}.tar.gz"
            "$RELEASE_DIST/sbom.spdx.json"
            "$RELEASE_DIST/release-notes.md"
            "$RELEASE_DIST/release-manifest.json"
            "$RELEASE_DIST/SHA256SUMS"
          )
          if [ -n "${RUNTIME_PATHS:-}" ]; then
            assets+=("$RELEASE_DIST/${PACKAGE_NAME}-runtime-${RELEASE_VERSION}.tar.gz")
          fi
          for asset in "${assets[@]}"; do
            if [ -L "$asset" ] || [ ! -f "$asset" ]; then
              echo "release asset closure is incomplete" >&2
              exit 1
            fi
          done

          release_args=(
            release create "$RELEASE_VERSION"
            --verify-tag
            --title "$RELEASE_VERSION"
            --notes-file "$RELEASE_DIST/release-notes.md"
          )
          release_args+=("${assets[@]}")
          local_tag_object="$(git rev-parse --verify "refs/tags/${RELEASE_VERSION}")"
          local_tag_commit="$(git rev-parse --verify "refs/tags/${RELEASE_VERSION}^{commit}")"
          head_commit="$(git rev-parse --verify HEAD)"
          remote_tag_object="$(
            gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_VERSION}" \
              --jq '.object.sha'
          )"
          if [ "$local_tag_commit" != "$head_commit" ]; then
            echo "release tag commit no longer equals checked-out HEAD" >&2
            exit 1
          fi
          if [ "$remote_tag_object" != "$local_tag_object" ]; then
            echo "remote release tag changed after checkout" >&2
            exit 1
          fi
          # Single create call: every asset is attached at publish time, which is
          # the immutable-release-compatible pattern (no post-publish clobber).
          gh "${release_args[@]}"
