name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (must equal VERSION and an existing tag).'
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            github.com:443
            api.github.com:443
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Resolve and validate version
        id: v
        env:
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then version="$INPUT_VERSION"; else version="$REF_NAME"; fi
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "version '$version' is not numeric SemVer" >&2; exit 1
          fi
          file_version="$(tr -d '[:space:]' < VERSION)"
          if [ "$version" != "$file_version" ]; then
            echo "version '$version' != VERSION '$file_version'" >&2; exit 1
          fi
          if ! grep -q "^## \[$version\]" CHANGELOG.md; then
            echo "CHANGELOG.md has no entry for $version" >&2; exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  publish:
    needs: resolve
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/release-supply-chain.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      package_name: nddev-ci-workflows
      archive_paths: "README.md LICENSE NOTICE SECURITY.md VERSION CHANGELOG.md .github"
