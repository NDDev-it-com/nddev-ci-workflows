name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (must equal VERSION and an existing tag).'
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            github.com:443
            api.github.com:443
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Resolve and validate version
        id: v
        env:
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 -I <<'PY'
          import os
          import pathlib
          import re
          import sys

          numeric_semver = re.compile(
              r"(?:0|[1-9][0-9]*)\."
              r"(?:0|[1-9][0-9]*)\."
              r"(?:0|[1-9][0-9]*)"
          )

          def fail(message):
              print(f"release contract: {message}", file=sys.stderr)
              raise SystemExit(1)

          version = (
              os.environ["INPUT_VERSION"]
              if os.environ["EVENT_NAME"] == "workflow_dispatch"
              else os.environ["REF_NAME"]
          )
          if numeric_semver.fullmatch(version) is None:
              fail("version must be numeric SemVer X.Y.Z without leading zeros")
          expected_version_file = f"{version}\n".encode("ascii")
          try:
              actual_version_file = pathlib.Path("VERSION").read_bytes()
          except OSError as exc:
              fail(f"cannot read VERSION: {exc}")
          if actual_version_file != expected_version_file:
              fail("VERSION must contain the exact release version on one LF-terminated line")
          changelog_heading = re.compile(rf"## \[{re.escape(version)}\](?: - .+)?")
          try:
              changelog_lines = pathlib.Path("CHANGELOG.md").read_text(
                  encoding="utf-8"
              ).splitlines()
          except OSError as exc:
              fail(f"cannot read CHANGELOG.md: {exc}")
          if (
              sum(
                  changelog_heading.fullmatch(line) is not None
                  for line in changelog_lines
              )
              != 1
          ):
              fail("CHANGELOG.md must have exactly one release heading")
          with pathlib.Path(os.environ["GITHUB_OUTPUT"]).open(
              "a", encoding="utf-8"
          ) as output:
              output.write(f"version={version}\n")
          print(f"release contract validated for {version}")
          PY

  publish:
    needs: resolve
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/release-supply-chain.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      package_name: nddev-ci-workflows
      archive_paths: >-
        README.md LICENSE NOTICE SECURITY.md SUPPORT.md CODE_OF_CONDUCT.md
        CONTRIBUTING.md AGENTS.md VERSION CHANGELOG.md .gitignore .github
        .claude catalog docs examples scripts requirements-ci.in
        requirements-ci.txt
