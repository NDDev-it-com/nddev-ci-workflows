name: secret-scan

# Reusable Gitleaks secret scan (history-aware) for BOTH tiers.
# The gitleaks tool is free on public and private repos. harden-runner is paid
# on private repos, so private callers pass enable_harden_runner: false.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      gitleaks_image:
        description: 'Digest-pinned gitleaks container image.'
        type: string
        default: 'zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f'
      enable_harden_runner:
        description: 'Enable step-security/harden-runner (public repos only; paid on private).'
        type: boolean
        default: true

permissions: {}

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks detect (history-aware, digest-pinned)
        env:
          GITLEAKS_IMAGE: ${{ inputs.gitleaks_image }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            -w /repo \
            "${GITLEAKS_IMAGE}" detect \
              --source /repo \
              --redact \
              --no-banner \
              --exit-code 1
