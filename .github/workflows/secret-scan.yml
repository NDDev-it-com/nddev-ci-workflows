name: secret-scan

# Reusable Gitleaks secret scan (history-aware) for BOTH tiers. The workflow is
# private-free safe: it contains no StepSecurity action or paid GitHub feature.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      gitleaks_image:
        description: 'Digest-pinned gitleaks container image.'
        type: string
        default: 'zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f'
      gitleaks_config_path:
        description: 'Optional repository-relative .gitleaks.toml path.'
        type: string
        default: ''
      report_format:
        description: 'Optional gitleaks report format, e.g. sarif.'
        type: string
        default: ''
      report_path:
        description: 'Optional repository-relative report path.'
        type: string
        default: ''
      upload_report:
        description: 'Upload report_path as a workflow artifact.'
        type: boolean
        default: false
      artifact_name:
        type: string
        default: 'gitleaks-report'
      retention_days:
        type: number
        default: 14
      post_command:
        description: 'Optional repository-local text/security scan after gitleaks.'
        type: string
        default: ''

permissions: {}

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks detect (history-aware, digest-pinned)
        env:
          GITLEAKS_IMAGE: ${{ inputs.gitleaks_image }}
          GITLEAKS_CONFIG_PATH: ${{ inputs.gitleaks_config_path }}
          GITLEAKS_REPORT_FORMAT: ${{ inputs.report_format }}
          GITLEAKS_REPORT_PATH: ${{ inputs.report_path }}
        run: |
          set -euo pipefail
          args=(detect --source /repo --redact --no-banner --exit-code 1)
          if [ -n "$GITLEAKS_CONFIG_PATH" ]; then
            args+=(--config "/repo/$GITLEAKS_CONFIG_PATH")
          fi
          if [ -n "$GITLEAKS_REPORT_PATH" ]; then
            args+=(--report-path "/repo/$GITLEAKS_REPORT_PATH")
          fi
          if [ -n "$GITLEAKS_REPORT_FORMAT" ]; then
            args+=(--report-format "$GITLEAKS_REPORT_FORMAT")
          fi
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            -w /repo \
            "${GITLEAKS_IMAGE}" "${args[@]}"

      - name: Run post-secret-scan command
        if: ${{ inputs.post_command != '' }}
        env:
          POST_COMMAND: ${{ inputs.post_command }}
        run: bash -c "$POST_COMMAND"

      - name: Upload gitleaks report
        if: ${{ always() && inputs.upload_report && inputs.report_path != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.report_path }}
          if-no-files-found: ignore
          retention-days: ${{ inputs.retention_days }}
