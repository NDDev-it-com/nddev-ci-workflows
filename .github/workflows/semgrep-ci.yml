name: semgrep-ci

# Reusable Semgrep OSS SAST for BOTH tiers. Free on private-free repos, where
# CodeQL is a paid GHAS feature. Gate-only: findings fail the job and no SARIF is
# uploaded, so no code-scanning (security-events) permission is required.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      working_directory:
        type: string
        default: '.'
      config:
        description: 'Semgrep ruleset(s): p/ci, p/default, p/security-audit, or a local path.'
        type: string
        default: 'p/ci'
      semgrep_version:
        description: 'Exact semgrep version to pin (empty installs the latest release).'
        type: string
        default: ''
      extra_args:
        type: string
        default: ''
      timeout_minutes:
        type: number
        default: 20

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  semgrep:
    name: semgrep
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: 0.11.30

      - name: Semgrep scan
        env:
          SEMGREP_VERSION: ${{ inputs.semgrep_version }}
          SEMGREP_CONFIG: ${{ inputs.config }}
          SEMGREP_EXTRA_ARGS: ${{ inputs.extra_args }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          uvx "semgrep${SEMGREP_VERSION:+@$SEMGREP_VERSION}" scan --error --metrics off --config "$SEMGREP_CONFIG" $SEMGREP_EXTRA_ARGS
          echo "Semgrep SAST passed." >> "$GITHUB_STEP_SUMMARY"
