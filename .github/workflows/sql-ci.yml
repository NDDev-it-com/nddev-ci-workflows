name: sql-ci

# Reusable SQL CI for BOTH tiers: pinned setup-python, and
# sqlfluff lint (dialect-aware) plus an optional caller command passed via env.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      python_version:
        type: string
        default: '3.13'
      working_directory:
        type: string
        default: '.'
      dialect:
        description: 'sqlfluff dialect: ansi, postgres, mysql, sqlite, bigquery, snowflake, tsql, ...'
        type: string
        default: 'ansi'
      paths:
        description: 'Path or directory to lint.'
        type: string
        default: '.'
      sqlfluff_version:
        description: 'Exact sqlfluff version to pin (empty installs the latest release).'
        type: string
        default: ''
      lint:
        description: 'Run sqlfluff lint.'
        type: boolean
        default: true
      extra_command:
        description: 'Additional command (bash), e.g. "sqlfluff format --diff". Empty to skip.'
        type: string
        default: ''
      timeout_minutes:
        type: number
        default: 15

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  sql:
    name: sql (${{ inputs.dialect }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: 0.11.29

      - name: Lint
        if: ${{ inputs.lint }}
        env:
          SQL_DIALECT: ${{ inputs.dialect }}
          SQL_PATHS: ${{ inputs.paths }}
          SQLFLUFF_VERSION: ${{ inputs.sqlfluff_version }}
        run: |
          set -euo pipefail
          uvx "sqlfluff${SQLFLUFF_VERSION:+@$SQLFLUFF_VERSION}" lint --dialect "$SQL_DIALECT" "$SQL_PATHS"
          echo "sqlfluff lint (${SQL_DIALECT}) passed." >> "$GITHUB_STEP_SUMMARY"

      - name: Extra command
        if: ${{ inputs.extra_command != '' }}
        env:
          EXTRA_COMMAND: ${{ inputs.extra_command }}
        run: bash -c "$EXTRA_COMMAND"
