name: swift-ci

# Reusable Swift CI. Defaults to a macOS runner (Swift + Xcode preinstalled;
# iOS/macOS builds bill at a 10x minute multiplier). Optional swift-actions
# setup for Linux/pinned Swift, optional SwiftLint + swift-format gates, and
# caller-provided build/test commands passed via env. The workflow is safe for
# the private-free tier and therefore contains no paid runtime-hardening action.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'macos-latest'
      swift_version:
        description: 'Swift version for swift-actions/setup-swift (Linux/pinned). Empty uses the runner toolchain.'
        type: string
        default: ''
      working_directory:
        type: string
        default: '.'
      swiftlint:
        description: 'Install (brew) and run SwiftLint. macOS runners only.'
        type: boolean
        default: false
      swift_format:
        description: 'Run "swift format lint" over the tree.'
        type: boolean
        default: false
      build_command:
        description: 'Build command (bash). Empty to skip.'
        type: string
        default: 'swift build'
      test_command:
        description: 'Test command (bash).'
        type: string
        default: 'swift test'
      timeout_minutes:
        type: number
        default: 30

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  swift:
    name: swift
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Swift
        if: ${{ inputs.swift_version != '' }}
        uses: swift-actions/setup-swift@364295d9c23900ce04d4e5cc708387921b4e50f9  # v3
        with:
          swift-version: ${{ inputs.swift_version }}

      - name: SwiftLint
        if: ${{ inputs.swiftlint && runner.os == 'macOS' }}
        run: |
          brew install swiftlint
          swiftlint --strict

      - name: swift-format
        if: ${{ inputs.swift_format }}
        run: swift format lint --recursive --strict .

      - name: Build
        if: ${{ inputs.build_command != '' }}
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
        run: bash -c "$BUILD_COMMAND"

      - name: Test
        env:
          TEST_COMMAND: ${{ inputs.test_command }}
        run: |
          bash -c "$TEST_COMMAND"
          echo "Swift build + test passed." >> "$GITHUB_STEP_SUMMARY"
