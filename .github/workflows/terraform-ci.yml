name: terraform-ci

# Reusable Terraform CI for BOTH tiers: pinned setup-terraform,
# and fmt + init (no backend) + validate. No cloud credentials are used.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      terraform_version:
        description: 'Terraform version constraint for setup-terraform. Pin an exact version or range for reproducible CI (see setup-terraform docs); "latest" always resolves to the newest release.'
        type: string
        default: 'latest'
      working_directory:
        type: string
        default: '.'
      timeout_minutes:
        type: number
        default: 15

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  terraform:
    name: terraform
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Validate
        run: |
          terraform validate
          echo "Terraform fmt + validate passed." >> "$GITHUB_STEP_SUMMARY"
