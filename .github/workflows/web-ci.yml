name: web-ci

# Reusable HTML/CSS/web CI for BOTH tiers: pinned oven-sh/setup-bun, and
# caller-provided lint/test commands passed via env. The default lint step runs
# stylelint + htmlhint via bunx; callers can add Lighthouse CI or pa11y via
# test_command.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      bun_version:
        description: 'Exact oven-sh/bun version to pin.'
        type: string
        default: '1.3.14'
      working_directory:
        type: string
        default: '.'
      install_command:
        description: 'Dependency install command (bash). Empty to skip.'
        type: string
        default: ''
      lint_command:
        description: 'Lint command (bash). Empty to skip.'
        type: string
        default: 'bunx stylelint "**/*.{css,scss}" --allow-empty-input && bunx htmlhint "**/*.html"'
      test_command:
        description: 'Additional test/verify command (bash), e.g. Lighthouse CI or pa11y. Empty to skip.'
        type: string
        default: ''
      timeout_minutes:
        type: number
        default: 15

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  web:
    name: web (bun ${{ inputs.bun_version }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: ${{ inputs.bun_version }}

      - name: Install dependencies
        if: ${{ inputs.install_command != '' }}
        env:
          INSTALL_COMMAND: ${{ inputs.install_command }}
        run: bash -c "$INSTALL_COMMAND"

      - name: Lint
        if: ${{ inputs.lint_command != '' }}
        env:
          LINT_COMMAND: ${{ inputs.lint_command }}
        run: bash -c "$LINT_COMMAND"

      - name: Run tests
        if: ${{ inputs.test_command != '' }}
        env:
          TEST_COMMAND: ${{ inputs.test_command }}
        run: bash -c "$TEST_COMMAND"

      - name: Summary
        env:
          BUN_VER: ${{ inputs.bun_version }}
        run: echo "web-ci (Bun ${BUN_VER}) lint + tests passed." >> "$GITHUB_STEP_SUMMARY"
