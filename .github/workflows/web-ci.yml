name: web-ci

# Reusable HTML/CSS/web CI for BOTH tiers: harden-runner, pinned setup-node, and
# caller-provided lint/test commands passed via env. The default lint step runs
# stylelint + htmlhint; callers can add Lighthouse CI or pa11y via test_command.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      node_version:
        type: string
        default: '22'
      working_directory:
        type: string
        default: '.'
      cache:
        description: 'setup-node cache: npm, yarn, pnpm, or empty to disable.'
        type: string
        default: ''
      cache_dependency_path:
        type: string
        default: ''
      install_command:
        description: 'Dependency install command (bash). Empty to skip.'
        type: string
        default: ''
      lint_command:
        description: 'Lint command (bash). Empty to skip.'
        type: string
        default: 'npx --yes stylelint "**/*.{css,scss}" --allow-empty-input && npx --yes htmlhint "**/*.html"'
      test_command:
        description: 'Additional test/verify command (bash), e.g. Lighthouse CI or pa11y. Empty to skip.'
        type: string
        default: ''
      enable_harden_runner:
        type: boolean
        default: true
      timeout_minutes:
        type: number
        default: 15

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  web:
    name: web (node ${{ inputs.node_version }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Harden runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.cache }}
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Install dependencies
        if: ${{ inputs.install_command != '' }}
        env:
          INSTALL_COMMAND: ${{ inputs.install_command }}
        run: bash -c "$INSTALL_COMMAND"

      - name: Lint
        if: ${{ inputs.lint_command != '' }}
        env:
          LINT_COMMAND: ${{ inputs.lint_command }}
        run: bash -c "$LINT_COMMAND"

      - name: Run tests
        if: ${{ inputs.test_command != '' }}
        env:
          TEST_COMMAND: ${{ inputs.test_command }}
        run: bash -c "$TEST_COMMAND"

      - name: Summary
        env:
          NODE_VER: ${{ inputs.node_version }}
        run: echo "web-ci (Node ${NODE_VER}) lint + tests passed." >> "$GITHUB_STEP_SUMMARY"
