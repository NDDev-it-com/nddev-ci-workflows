name: zizmor-sarif

# Reusable zizmor GitHub Actions security static analysis WITH SARIF upload.
# Use on PUBLIC repos (code scanning is free) or private repos WITH GitHub Code
# Security. The caller job must grant `security-events: write`. For private-free
# repos, use zizmor-no-sarif.yml instead (contents: read only).
#
# zizmor catches Actions anti-patterns actionlint/CodeQL miss: template
# injection, credential persistence/leakage, excessive permissions, impostor
# commits, and confusable refs.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      zizmor_version:
        type: string
        default: '1.26.1'
      persona:
        description: 'zizmor persona: regular, pedantic, or auditor.'
        type: string
        default: 'regular'
      min_severity:
        description: 'Minimum finding severity to report: unknown, informational, low, medium, high.'
        type: string
        default: 'low'
      target:
        description: 'Path zizmor analyzes.'
        type: string
        default: '.'
      enable_harden_runner:
        type: boolean
        default: true

permissions: {}

jobs:
  zizmor:
    name: zizmor (SARIF)
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      # Read repository contents and publish zizmor SARIF to code scanning.
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"

      - name: Install zizmor (pinned)
        env:
          ZIZMOR_VERSION: ${{ inputs.zizmor_version }}
        run: python3 -m pip install "zizmor==${ZIZMOR_VERSION}"

      - name: Run zizmor (SARIF)
        id: scan
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          ZIZMOR_PERSONA: ${{ inputs.persona }}
          ZIZMOR_MIN_SEVERITY: ${{ inputs.min_severity }}
          ZIZMOR_TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          zizmor \
            --persona "${ZIZMOR_PERSONA}" \
            --min-severity "${ZIZMOR_MIN_SEVERITY}" \
            --format sarif \
            "${ZIZMOR_TARGET}" > zizmor.sarif

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: zizmor.sarif
          category: zizmor

      - name: Enforce zizmor result
        if: ${{ steps.scan.outcome == 'failure' }}
        env:
          ZIZMOR_MIN_SEVERITY: ${{ inputs.min_severity }}
        run: |
          echo "zizmor reported findings at or above severity '${ZIZMOR_MIN_SEVERITY}'." >&2
          exit 1
