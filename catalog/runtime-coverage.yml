# Runtime contract coverage for every published reusable workflow.
#
# Honest ledger, not an aspiration: a workflow is only 'runtime-proven'
# when a real observed workflow_call run exists (last_run set). Workflows
# with executable embedded-program/contract validators but no live
# workflow_call run are 'static-only'. Everything else is 'unverified'
# until a safe consumer fixture runs it, or 'waived' with an owner and
# expiry. scripts/validate_runtime_coverage.py enforces completeness
# (every reusable workflow has exactly one record) and evidence/waiver
# discipline, and reports the honest status counts.
