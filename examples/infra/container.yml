# Container/filesystem Trivy scan caller (any tier). Replace @<sha>.
name: container
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: {}
concurrency:
  group: container-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  container:
    permissions: { contents: read }
    uses: NDDev-it-com/ci-workflows/.github/workflows/container-ci.yml@<sha>
    with:
      scan_type: fs
      scan_ref: '.'
      severity: 'CRITICAL,HIGH'
