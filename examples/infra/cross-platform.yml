# Cross-platform smoke test caller (any tier). Replace @<sha>.
name: cross-platform
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: {}
concurrency:
  group: cross-platform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  smoke:
    permissions: { contents: read }
    uses: NDDev-it-com/ci-workflows/.github/workflows/cross-platform-smoke.yml@<sha>
    with:
      os_list: '["ubuntu-latest","macos-latest","windows-latest"]'
      command: 'python -c "import sys; print(sys.platform)"'
