# Dart/Flutter CI caller (any tier). Replace @<sha> with a pinned full commit SHA.
name: dart-flutter
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: {}
concurrency:
  group: dart-flutter-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  dart-flutter:
    permissions: { contents: read }
    uses: NDDev-it-com/ci-workflows/.github/workflows/dart-flutter-ci.yml@<sha>
    with:
      flutter_channel: stable
      test_command: 'flutter test --coverage'
