# Go CI caller (any tier). Replace @<sha> with a pinned full commit SHA.
name: go
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: {}
concurrency:
  group: go-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  go:
    permissions: { contents: read }
    uses: NDDev-it-com/ci-workflows/.github/workflows/go-ci.yml@<sha>
    with:
      # Required when validation inspects commit ancestry or pull-request merge parents.
      fetch_depth: 0
      test_command: 'go test -race ./...'
