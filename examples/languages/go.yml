# Go CI caller (any tier). Replace @<sha> with a pinned full commit SHA.
# Private-free callers add `with: { enable_harden_runner: false }`.
name: go
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: {}
concurrency:
  group: go-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  go:
    permissions: { contents: read }
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/go-ci.yml@<sha>
    with:
      test_command: 'go test -race ./...'
