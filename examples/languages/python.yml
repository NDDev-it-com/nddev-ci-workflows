# Python CI caller (any tier). Replace @<sha> with a pinned full commit SHA.
name: python
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: {}
concurrency:
  group: python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  python:
    permissions: { contents: read }
    uses: NDDev-it-com/ci-workflows/.github/workflows/python-ci.yml@<sha>
    with:
      python_version: '3.13'
      install_command: 'uv sync --frozen'
      test_command: 'uv run pytest'
