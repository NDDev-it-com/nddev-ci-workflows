# PR-hygiene caller. Replace @<sha> with a pinned full commit SHA.
# Defaults run commitlint + PR-title (contents: read). To enable labeler/stale,
# turn them on and widen the caller job permissions (pull-requests: write, and
# issues: write for stale).
name: pr-hygiene
on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened]
permissions: {}
jobs:
  pr-hygiene:
    permissions: { contents: read }
    uses: NDDev-it-com/ci-workflows/.github/workflows/pr-hygiene.yml@<sha>
