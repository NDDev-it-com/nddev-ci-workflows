# Publish a package to the npm registry with Bun (uv/bun-only policy: no npm CLI).
# Replace @<sha> with pinned full SHAs for actions. Provide a scoped registry
# token via secrets (BUN_AUTH_TOKEN); run only on GitHub-hosted runners.
name: release-npm
on:
  push:
    tags: ["v*"]
permissions: {}
concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@<sha>
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@<sha>
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - run: bun test
      - env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish
