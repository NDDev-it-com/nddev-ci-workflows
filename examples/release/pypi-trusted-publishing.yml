# PyPI Trusted Publishing via OIDC.
# Configure the PyPI project trusted publisher first. Do not set username,
# password, or API-token secrets in this workflow.
name: release-pypi
on:
  push:
    tags: ["v*"]
permissions: {}
concurrency:
  group: release-pypi-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@<sha>
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@<sha>
        with:
          version: "0.11.30"
      - run: uv build
      - uses: actions/upload-artifact@<sha>
        with:
          name: release-dists
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@<sha>
        with:
          name: release-dists
          path: dist/
      - uses: pypa/gh-action-pypi-publish@<sha>
