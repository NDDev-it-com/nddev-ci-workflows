# Mutation testing caller (any tier). Replace @<sha>.
name: mutation-testing
on:
  workflow_dispatch:
  schedule: [{ cron: "0 3 * * 1" }]
permissions: {}
jobs:
  mutation:
    permissions: { contents: read }
    uses: NDDev-it-com/ci-workflows/.github/workflows/mutation-testing.yml@<sha>
    with:
      language: python
      install_command: 'uv tool install mutmut'
      mutation_command: 'mutmut run'
